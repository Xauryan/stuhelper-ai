name: Publish Docker image

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to build, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if ! git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "::error::Tag '${TAG}' does not exist"
              exit 1
            fi
            git checkout --detach "refs/tags/${TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "${TAG}" > VERSION
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "VERSION_TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.tag }}
            ${{ steps.version.outputs.image }}:latest
          labels: |
            org.opencontainers.image.title=StuHelper AI
            org.opencontainers.image.description=StuHelper AI container image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Image summary
        shell: bash
        run: |
          {
            echo "### Published image"
            echo
            echo '```text'
            echo "${IMAGE}:${VERSION_TAG}"
            echo "${IMAGE}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
